---
layout: default
main_class: blog-main
---
<article class="max-width-container blog-post-article">
    <header class="blog-post-header">
        <h1 class="font-display blog-title-main">{{ page.title }}</h1>
        {% if page.subtitle %}<p class="text-muted-styled" style="margin-top: 16px; font-size: 1.1rem;">{{ page.subtitle }}</p>{% endif %}
    </header>
    <div class="blog-body-content">
        {{ content }}
    </div>
</article>
