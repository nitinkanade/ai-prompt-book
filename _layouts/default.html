<!DOCTYPE html>
<html lang="{{ site.lang }}">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#0a0c10">
    <meta name="robots" content="index, follow">
    <link rel="icon" type="image/svg+xml" href="{{ '/favicon.svg' | relative_url }}">
    <link rel="apple-touch-icon" href="{{ '/favicon.svg' | relative_url }}">
    <link rel="preconnect" href="https://lh3.googleusercontent.com" crossorigin>
    <link rel="preconnect" href="https://contribution.usercontent.google.com" crossorigin>

    {% seo %}

    <!-- Google Analytics 4 (production domain only) -->
    {% if jekyll.environment == 'production' %}
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-0598FMTXTN"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'G-0598FMTXTN');
    </script>
    {% endif %}
    <link rel="alternate" type="application/rss+xml" title="{{ site.title }} Blog" href="{{ '/feed.xml' | relative_url }}">

    <!-- Fonts: Outfit is self-hosted (see css/style.css); icons stay on Google Fonts -->
    <link rel="preload" href="{{ '/fonts/outfit-latin.woff2' | relative_url }}" as="font" type="font/woff2" crossorigin>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" rel="stylesheet">

    <link rel="stylesheet" href="{{ '/css/style.css' | relative_url }}?v=7">
    {% if page.head_extra %}{{ page.head_extra }}{% endif %}
</head>
<body>

    {% include header.html %}

    <main{% if page.main_class %} class="{{ page.main_class }}"{% endif %}>
        {{ content }}
    </main>

    {% include footer.html %}

    <script src="{{ '/js/app.js' | relative_url }}?v=5"></script>
</body>
</html>
