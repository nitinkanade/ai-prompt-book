# Blog permalinks: /blog/post-slug/
permalink: /blog/:title/

# Search engine site verification (rendered by jekyll-seo-tag).
# Paste the content value from Search Console's HTML-tag method:
# webmaster_verifications:
#   google: "your-google-verification-code"
#   bing: "your-bing-verification-code"

# GitHub Pages whitelisted plugins
plugins:
  - jekyll-seo-tag
  - jekyll-sitemap
  - jekyll-feed

feed:
  posts_limit: 20

defaults:
  - scope:
      path: ""
      type: posts
    values:
      layout: post
      author: AI Prompt Book Team
  # Keep the Search Console verification file out of the sitemap
  - scope:
      path: "google3bd87c2ab5345315.html"
    values:
      sitemap: false
  - scope:
      path: ""
    values:
      layout: default
      image: "https://lh3.googleusercontent.com/aida-public/AB6AXuBhDmOTESylZjMUxZ5JuInWYwZ9vAjFIpT1cZ9hVxGQ9VgrxuiFOpk7z_g8vF5NMIijMZzrdE_GWHWyXs1geYjdQKPg6wRFjp6v2rfO783I4EZV_7qB2d7_EyT00hv1a5SnsW8cIHDOEEI4Zq1JpbwRQ43CVEjPkrZZ89lqZm6bpRoKwWD3M-vzd_W1lUODSE-g5KmYidEmb3Zd4PbAnCWuTkKXH81204D8fhO0O_AhvPbXJ3SfpjUQFU4LJ3yBOeeIcn0"

exclude:
  - README.md
  - Gemfile
  - Gemfile.lock
  - vendor

# Android App Links verification file — Jekyll skips dot-folders by default
include:
  - .well-known
