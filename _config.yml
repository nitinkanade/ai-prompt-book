title: AI Prompt Book
tagline: Copy & Remix Creative AI Art Prompts
description: >-
  Curated library of tested AI image prompts for Midjourney, Stable Diffusion,
  DALL-E and Gemini. Copy in one tap, remix with your own photo, and create
  stunning AI art with the free AI Prompt Book Android app.
url: "https://aipromptbook.ni18.in"
baseurl: ""
lang: en

# App info (reused across pages)
